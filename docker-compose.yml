services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rwa-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    volumes:
      # Pinned CA used to validate Keycloak's self-signed TLS cert.
      # Path inside the container must match KEYCLOAK_CA_CERT_PATH in .env.
      - ./deployment/keycloak/tls/tls.crt:/etc/ssl/keycloak/ca.crt:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - rwa-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rwa-celery-worker
    restart: unless-stopped
    command: celery -A backend.core.celery_app worker -l INFO --concurrency=2
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    volumes:
      - ./deployment/keycloak/tls/tls.crt:/etc/ssl/keycloak/ca.crt:ro
    # Celery needs Redis (broker) and Postgres (result backend / DB tasks).
    # Both are expected to be running externally or added as services here.
    # No dependency on `api` — the worker connects to the broker directly.
    networks:
      - rwa-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  rwa-network:
    driver: bridge
