version: "3.8"

# SigNoz — self-hosted observability (metrics + traces + logs)
# Replaces Prometheus + Grafana
# UI: http://10.10.10.150:3301
# OTLP gRPC: 10.10.10.150:4317
# OTLP HTTP: 10.10.10.150:4318

x-clickhouse-defaults: &clickhouse-defaults
  restart: on-failure
  image: clickhouse/clickhouse-server:24.1.2-alpine
  tty: true
  depends_on:
    - zookeeper-1
  logging:
    options:
      max-size: "50m"
      max-file: "3"

services:

  # ── ZooKeeper (ClickHouse coordination) ─────────────────────────────────────
  zookeeper-1:
    image: bitnami/zookeeper:3.7.2
    hostname: zookeeper-1
    user: root
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
    restart: on-failure

  # ── ClickHouse (primary storage) ─────────────────────────────────────────────
  clickhouse:
    <<: *clickhouse-defaults
    hostname: clickhouse
    ports:
      - "9000:9000"
      - "8123:8123"
      - "9181:9181"
    volumes:
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./clickhouse-users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── SigNoz Schema Migrator (runs once, then exits) ──────────────────────────
  schema-migrator:
    image: signoz/signoz-schema-migrator:0.111.0
    command: ["--dsn=tcp://clickhouse:9000"]
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: on-failure

  # ── OpenTelemetry Collector ──────────────────────────────────────────────────
  otel-collector:
    image: signoz/signoz-otel-collector:0.111.0
    command:
      - "--config=/etc/otel-collector-config.yaml"
      - "--feature-gates=-pkg.translator.prometheus.NormalizeName"
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC  (FastAPI → SigNoz)
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Collector self-metrics
    restart: on-failure
    depends_on:
      clickhouse:
        condition: service_healthy
    logging:
      options:
        max-size: "50m"
        max-file: "3"

  # ── SigNoz Query Service (API backend) ──────────────────────────────────────
  query-service:
    image: signoz/query-service:0.55.1
    command: ["-config=/root/config/prometheus.yml"]
    volumes:
      - ./prometheus-query.yml:/root/config/prometheus.yml:ro
      - signoz-data:/var/lib/signoz
    environment:
      ClickHouseUrl:     "tcp://clickhouse:9000"
      STORAGE:           "clickhouse"
      GODEBUG:           "netdns=go"
      TELEMETRY_ENABLED: "false"
      DEPLOYMENT_TYPE:   "docker-standalone-amd"
    ports:
      - "8080:8080"
      - "8085:8085"
    restart: on-failure
    depends_on:
      - schema-migrator
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── SigNoz Frontend ──────────────────────────────────────────────────────────
  frontend:
    image: signoz/frontend:0.55.1
    ports:
      - "3301:3301"
    restart: on-failure
    depends_on:
      query-service:
        condition: service_healthy
    environment:
      - FRONTEND_API_ENDPOINT=http://query-service:8080

volumes:
  zookeeper-data:
  clickhouse-data:
  signoz-data:
