apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      prometheusType: Prometheus

  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://127.0.0.1:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields: []
