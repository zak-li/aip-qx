syntax = "proto3";

package rwa.compliance;


service ComplianceService {
  rpc ListComplianceRecords (PaginationRequest)    returns (ComplianceList);
  rpc GetActiveAlerts       (PaginationRequest)    returns (AlertList);
  rpc GetComplianceStatus   (UserIdRequest)        returns (ComplianceStatus);
  rpc SubmitKYC             (KYCSubmitRequest)     returns (KYCSubmitResponse);
  rpc ApproveKYC            (KYCApproveRequest)    returns (KYCApproveResponse);
  rpc RunAMLScreening       (AMLScreeningRequest)  returns (AMLResult);
}

// ---------------------------------------------------------------------------

message PaginationRequest {
  int32 limit  = 1;
  int32 offset = 2;
}

message UserIdRequest { string user_id = 1; }

message ComplianceStatus {
  string  participant_id = 1;
  string  kyc_status     = 2;
  int32   kyc_level      = 3;
  double  aml_score      = 4;
  string  risk_category  = 5;
  bool    sanctions_hit  = 6;
  bool    pep_status     = 7;
  string  expires_at     = 8;
}

message ComplianceList { repeated ComplianceStatus records = 1; }

message Alert {
  string type           = 1;
  string participant_id = 2;
  string risk_category  = 3;
  double aml_score      = 4;
  bool   sanctions_hit  = 5;
  bool   pep_status     = 6;
  string expires_at     = 7;
  string sar_ref        = 8;
  string reason_code    = 9;
  double amount         = 10;
  string created_at     = 11;
}

message AlertList { repeated Alert alerts = 1; }

message KYCSubmitRequest {
  string user_id          = 1;
  string document_type    = 2;
  string file_hash        = 3;
  string document_number  = 4;
  string issuing_country  = 5;
}

message KYCSubmitResponse {
  string message       = 1;
  string document_type = 2;
}

message KYCApproveRequest {
  string user_id       = 1;
  int32  level         = 2;
  int32  validity_days = 3;
  string notes         = 4;
}

message KYCApproveResponse {
  string message       = 1;
  string kyc_status    = 2;
  string expires_at    = 3;
  bool   needs_renewal = 4;
}

message AMLScreeningRequest {
  string user_id          = 1;
  double amount           = 2;
  string counterparty_id  = 3;
}

message AMLResult {
  double           score         = 1;
  string           risk_category = 2;
  bool             blocked       = 3;
  repeated string  indicators    = 4;
}
