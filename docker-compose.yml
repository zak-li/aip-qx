services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rwa-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    volumes:
      # Pinned CA used to validate Keycloak's self-signed TLS cert.
      # Path inside the container must match KEYCLOAK_CA_CERT_PATH in .env.
      - ./deployment/keycloak/tls/tls.crt:/etc/ssl/keycloak/ca.crt:ro
      # Fabric identity wallet and crypto material — excluded from the image
      # by .dockerignore, so they must be mounted at runtime.
      - ./dlt-nodes/wallets:/app/dlt-nodes/wallets:ro
      - ./dlt-nodes/crypto-config:/app/dlt-nodes/crypto-config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - rwa-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rwa-celery-worker
    restart: unless-stopped
    command: celery -A core.core.celery_app worker -l INFO --concurrency=2
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    volumes:
      - ./deployment/keycloak/tls/tls.crt:/etc/ssl/keycloak/ca.crt:ro
    # Celery doesn't expose HTTP — use `inspect ping` which round-trips through
    # the broker and proves the worker is actually consuming.
    healthcheck:
      test: ["CMD-SHELL", "celery -A core.core.celery_app inspect ping -d celery@$$(hostname) -t 5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Celery needs Redis (broker) and Postgres (result backend / DB tasks).
    # Both are expected to be running externally or added as services here.
    # No dependency on `api` — the worker connects to the broker directly.
    networks:
      - rwa-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  rwa-network:
    driver: bridge
    # ── Network Architecture ─────────────────────────────────────────────
    # The platform uses THREE separate Docker networks by design:
    #   1. rwa-network       — API + Celery (this file)
    #   2. rwa-network       — Fabric peers, orderer, CouchDB, Neo4j
    #                          (dlt-nodes/docker/docker-compose.yaml)
    #   3. (default)         — Keycloak
    #                          (deployment/keycloak/docker-compose.keycloak.yml)
    #
    # Cross-network communication goes through the HOST IP (10.10.10.150)
    # via published ports. This is intentional: Fabric and Keycloak are
    # managed by separate compose files with independent lifecycles.
    #
    # To unify into a single network, use:
    #   docker network create rwa-shared
    # and set `external: true` + `name: rwa-shared` in all compose files.
