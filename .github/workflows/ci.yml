name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  # Opt into the Node.js 24 runner so the deprecation notice on JS-based
  # actions stops showing up before the June 2026 hard cut-over.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.7.4 bandit==1.8.0

      - name: Ruff (backend + scripts + tests + deployment)
        run: ruff check backend/ scripts/ tests/ deployment/

      - name: Bandit (security, backend)
        # Skip B101 (assert in tests) -- keeps the rule set tight without noise.
        run: bandit -r backend/ -ll --skip B101

      - name: Bandit (security, scripts)
        # scripts/_deploy_*.py and deploy_frontend_to_vm.py are dev-only SSH
        # helpers — paramiko host-key trust (B507), shell-interpolated remote
        # commands (B601), and remote /tmp paths (B108) are intentional and
        # acknowledged in source via noqa. Block on anything else Medium+.
        run: bandit -r scripts/ -ll --skip B101,B507,B601,B108

      - name: Bandit (security, deployment)
        # No SSH helpers in deployment/ — strict mode, no skips beyond B101.
        run: bandit -r deployment/ -ll --skip B101

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile every backend module
        run: python -m compileall -q backend/

  python-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rwaadmin
          POSTGRES_PASSWORD: rwaadmin
          POSTGRES_DB: rwadb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://rwaadmin:rwaadmin@localhost:5432/rwadb
      TEST_DATABASE_URL: postgresql+asyncpg://rwaadmin:rwaadmin@localhost:5432/rwadb_test
      TEST_ADMIN_DB_URL: postgresql://rwaadmin:rwaadmin@localhost:5432/rwadb
      REDIS_URL: redis://localhost:6379/0
      ALLOWED_ORIGINS: http://localhost:3000
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: ci-test-vault-token
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: rwa-platform
      KEYCLOAK_CLIENT_ID: rwa-api
      KEYCLOAK_CLIENT_SECRET: ci-test-keycloak-secret
      KEYCLOAK_CALLBACK_URL: http://localhost:8000/api/v1/auth/callback
      KEYCLOAK_VERIFY_TLS: "false"
      FABRIC_WALLET_PATH: tests/fixtures/json/fabric_wallets_test.json
      FABRIC_CONNECTION_PROFILE: network/config/connection_profile.yaml
      FABRIC_CHANNEL: rwa-channel
      FABRIC_CHAINCODE: rwa-token
      FABRIC_TLS_ENABLED: "false"
      FABRIC_GRPC_TIMEOUT: "30"
      FABRIC_REQUIRED_MSPS: BANK01MSP,REG01MSP
      FABRIC_RETRY_MAX_ATTEMPTS: "5"
      FABRIC_RETRY_BASE_DELAY: "2.0"
      FABRIC_RETRY_FACTOR: "2.0"
      FABRIC_RETRY_JITTER: "0.2"
      FABRIC_RETRY_CIRCUIT_BREAKER_THRESHOLD: "5"
      FABRIC_RETRY_CIRCUIT_BREAKER_TIMEOUT: "60.0"
      FABRIC_EVENTS_RATE_LIMIT: "100.0"
      FABRIC_EVENTS_REDIS_CHANNEL: fabric:events
      FABRIC_EVENTS_TARGETS: AssetCreated,AssetTransferred,AssetFrozen,AssetUnfrozen
      FABRIC_EVENTS_REQUIRED_PAYLOAD_FIELDS: txID,action,assetID
      FABRIC_EVENTS_GRPC_RECONNECT_DELAY: "5.0"
      FABRIC_EVENTS_GRPC_SIMULATION_DELAY: "1.0"
      FABRIC_LEDGER_NOT_FOUND_ERROR_STRING: MISSING
      FABRIC_ENDORSEMENT_ERROR_STRING: ENDORSEMENT_POLICY_FAILURE

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run unit tests with coverage
        # Integration / e2e suites need Fabric + Vault -- excluded from CI.
        # Without them the realistic backend coverage is ~43% (routers and
        # grpc servicers are exercised only by integration tests). The 70%
        # target in pyproject.toml is for the full local suite; CI enforces
        # a softer floor to catch regressions without forcing a green that
        # doesn't reflect reality.
        run: |
          pytest tests/ -q \
            --ignore=tests/integration \
            --ignore=tests/e2e \
            --ignore=tests/unit/test_fhe.py \
            --ignore=tests/unit/test_mfa.py \
            --cov=backend --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=40

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: chaincode/rwa-token/go.sum
      - name: Build chaincode
        working-directory: chaincode/rwa-token
        run: go build ./...
      - name: Vet chaincode
        working-directory: chaincode/rwa-token
        run: go vet ./...
      - name: Test chaincode
        working-directory: chaincode/rwa-token
        run: go test ./...
