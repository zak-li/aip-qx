services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: rwa-keycloak
    restart: unless-stopped
    command: start
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://10.10.10.150:5432/keycloak_db
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      # HTTPS — self-signed cert mounted from ./tls (generated by gen-tls.sh).
      # HTTP is disabled so credentials are never sent in clear text.
      KC_HTTP_ENABLED: "false"
      KC_HTTPS_ENABLED: "true"
      KC_HTTPS_PORT: "8443"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/tls/tls.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/tls/tls.key
      # Hostname — explicit URL so issued tokens carry the right `iss` claim
      KC_HOSTNAME_URL: "https://${KEYCLOAK_HOSTNAME}:8443"
      KC_HOSTNAME_ADMIN_URL: "https://${KEYCLOAK_HOSTNAME}:8443"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      # Admin credentials (first boot only)
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_LOG_LEVEL: INFO
      KC_CACHE: local
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # Custom theme — set per-realm in the admin UI to make it the login theme.
      # Disabling theme cache here so .ftl edits during dev are picked up live;
      # flip back to true in real production after the theme has stabilised.
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./tls:/opt/keycloak/conf/tls:ro
      # Mount the regx theme as a sibling of Keycloak's built-in themes so
      # `parent=base` resolution still finds the bundled base/common assets.
      - ./themes/regx:/opt/keycloak/themes/regx:ro
    ports:
      - "8443:8443"
    # No in-container healthcheck — Keycloak 24's distroless image ships no
    # curl/wget/openssl and TLS-from-bash is impractical. The /health/ready
    # endpoint is probed externally by Prometheus/Blackbox via the host port.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  keycloak_data:
