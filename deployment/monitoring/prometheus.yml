global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: qx
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: qx-api
    static_configs:
      - targets: [localhost:8000]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: node-exporter
    static_configs:
      - targets: [localhost:9100]

  - job_name: redis
    static_configs:
      - targets: [localhost:9121]

  - job_name: postgres
    static_configs:
      - targets: [localhost:9187]

  - job_name: celery
    static_configs:
      - targets: [localhost:9808]

  # Keycloak — KC_METRICS_ENABLED=true exposes /metrics on the main HTTPS port.
  # The TLS cert is self-signed for 10.10.10.150, so we skip verification when
  # scraping from localhost.
  - job_name: keycloak
    scheme: https
    static_configs:
      - targets: [10.10.10.150:8443]
    metrics_path: /metrics
    tls_config:
      insecure_skip_verify: true

  # Vault — unauthenticated_metrics_access=true is set in vault.hcl so no
  # token is required to read /v1/sys/metrics.
  - job_name: vault
    static_configs:
      - targets: [localhost:8200]
    metrics_path: /v1/sys/metrics
    params:
      format: [prometheus]

  # Fabric peers are currently down (images pruned and not yet repulled). Kept
  # here so that when Fabric is restored the dashboard immediately picks up its
  # metrics — Prometheus marks them DOWN until they come back, which is the
  # intended behaviour, not an error.
  - job_name: fabric-peer-bank01
    static_configs:
      - targets: [localhost:9444]

  - job_name: fabric-peer-reg01
    static_configs:
      - targets: [localhost:9445]

  - job_name: couchdb-bank01
    static_configs:
      - targets: [localhost:5984]
    metrics_path: /_node/_local/_prometheus
    basic_auth:
      username: admin
      password_file: /etc/prometheus/couchdb_pass.txt

  - job_name: couchdb-reg01
    static_configs:
      - targets: [localhost:7984]
    metrics_path: /_node/_local/_prometheus
    basic_auth:
      username: admin
      password_file: /etc/prometheus/couchdb_pass.txt
