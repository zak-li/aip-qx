apiVersion: 1

# When Grafana restarts, any existing data source with these UIDs gets removed
# first so this file is the single source of truth.
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    # UID preserved from the original provisioning so the existing grafana_dashboard.json
    # panels keep working without rewiring every datasource reference.
    uid: ffgx1hbr25a0wc
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://127.0.0.1:3100
    jsonData:
      maxLines: 1000
