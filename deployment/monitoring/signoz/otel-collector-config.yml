# OpenTelemetry Collector — replaces Prometheus scraping
# Scrapes all 8 existing exporters + receives OTLP from FastAPI

receivers:

  # ── OTLP receiver — FastAPI sends traces, metrics, logs here ────────────────
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # ── Prometheus scraping — same jobs as the old prometheus.yml ────────────────
  prometheus:
    config:
      global:
        scrape_interval: 15s
        scrape_timeout:  10s
      scrape_configs:

        - job_name: rwa-api
          static_configs:
            - targets: ["10.10.10.150:8000"]
          metrics_path: /metrics

        - job_name: fabric-peer-bnp
          static_configs:
            - targets: ["10.10.10.150:9444"]

        - job_name: fabric-peer-amf
          static_configs:
            - targets: ["10.10.10.150:9445"]

        - job_name: couchdb-bnp
          static_configs:
            - targets: ["10.10.10.150:5984"]
          metrics_path: /_prometheus

        - job_name: couchdb-amf
          static_configs:
            - targets: ["10.10.10.150:7984"]
          metrics_path: /_prometheus

        - job_name: redis
          static_configs:
            - targets: ["10.10.10.150:9121"]

        - job_name: postgres
          static_configs:
            - targets: ["10.10.10.150:9187"]

        - job_name: celery
          static_configs:
            - targets: ["10.10.10.150:9808"]

  # ── Collector self-metrics ───────────────────────────────────────────────────
  prometheus/collector:
    config:
      scrape_configs:
        - job_name: otel-collector
          static_configs:
            - targets: ["localhost:8888"]

processors:

  batch:
    send_batch_size:     10000
    send_batch_max_size: 11000
    timeout:             10s

  memory_limiter:
    check_interval:         1s
    limit_percentage:       75
    spike_limit_percentage: 20

  # Enrich all signals with deployment metadata
  resource:
    attributes:
      - key:    deployment.environment
        value:  production
        action: upsert
      - key:    service.namespace
        value:  rwa-platform
        action: upsert

exporters:

  # ── SigNoz ClickHouse exporters ──────────────────────────────────────────────
  clickhousetraces:
    datasource: tcp://clickhouse:9000?database=signoz_traces

  clickhousemetricswrite:
    endpoint:  tcp://clickhouse:9000?database=signoz_metrics
    timeout:   10s

  clickhouselogsexporter:
    datasource: tcp://clickhouse:9000?database=signoz_logs
    timeout:    10s

  # Debug (comment out in production to reduce log noise)
  # logging:
  #   loglevel: debug

service:
  pipelines:

    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [clickhousetraces]

    metrics:
      receivers:  [otlp, prometheus, prometheus/collector]
      processors: [memory_limiter, resource, batch]
      exporters:  [clickhousemetricswrite]

    logs:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [clickhouselogsexporter]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
