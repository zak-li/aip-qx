name: qx-keycloak
services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: qx-keycloak
    restart: unless-stopped
    command: start
    # Secrets (KC_DB_PASSWORD, KEYCLOAK_ADMIN_PASSWORD) live in the gitignored
    # `.env.kc` file next to this compose. Compose-time `${VAR}` interpolation
    # via --env-file is flaky with certain special chars; `env_file:` makes
    # Docker load the values at runtime which is deterministic.
    env_file:
      - .env.kc
    environment:
      # Database — Keycloak schema lives on the host PostgreSQL cluster.
      # Supabase Supavisor refused the JDBC SNI handshake (`no tenant identifier
      # provided`), so we host keycloak_db locally. The app DB (rwadb) moved
      # to Supabase, and rwadb_test was dropped.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://10.10.10.150:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      # KC_DB_PASSWORD: via .env.kc
      # HTTPS — self-signed cert mounted from ./tls (generated by gen-tls.sh).
      # HTTP is disabled so credentials are never sent in clear text.
      KC_HTTP_ENABLED: "false"
      KC_HTTPS_ENABLED: "true"
      KC_HTTPS_PORT: "8443"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/tls/tls.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/tls/tls.key
      # Hostname — explicit URL so issued tokens carry the right `iss` claim
      KC_HOSTNAME_URL: "https://10.10.10.150:8443"
      KC_HOSTNAME_ADMIN_URL: "https://10.10.10.150:8443"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      # Admin bootstrap user (only honored on first boot of a fresh DB)
      KEYCLOAK_ADMIN: admin
      # KEYCLOAK_ADMIN_PASSWORD: via .env.kc
      KC_LOG_LEVEL: INFO
      KC_CACHE: local
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # Custom theme — set per-realm in the admin UI to make it the login theme.
      # Disabling theme cache here so .ftl edits during dev are picked up live;
      # flip back to true in real production after the theme has stabilised.
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./tls:/opt/keycloak/conf/tls:ro
      # Mount the qx theme as a sibling of Keycloak's built-in themes so
      # `parent=base` resolution still finds the bundled base/common assets.
      - ./themes/qx:/opt/keycloak/themes/qx:ro
    ports:
      - "8443:8443"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          memory: 512M
    # No in-container healthcheck — Keycloak 24's distroless image ships no
    # curl/wget/openssl and TLS-from-bash is impractical. The /health/ready
    # endpoint is probed externally by Prometheus/Blackbox via the host port.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  # The volume was created under the legacy project name `keycloak` (when this
  # compose file had no top-level `name:`). Marking it external so the rename
  # to `qx-keycloak` doesn't orphan the realm / client / user / theme data.
  # If you ever wipe state, run: docker volume create keycloak_keycloak_data
  keycloak_data:
    external: true
    name: keycloak_keycloak_data
